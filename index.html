<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SupResales PR — El Plug Directo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #E51C1C;
    --red-dark: #B01515;
    --black: #0A0A0A;
    --black2: #111111;
    --white: #FFFFFF;
    --grey: #888888;
    --grey-light: #CCCCCC;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Barlow', sans-serif;
  }

  nav {
    position: sticky;
    top: 0;
    z-index: 500;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
  }
  .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 26px; text-decoration: none; color: var(--white); }
  .nav-logo span { color: var(--red); }

  .products-section { padding: 40px 20px; max-width: 1200px; margin: 0 auto; }
  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 50px; text-align: center; margin-bottom: 40px; color: var(--white); }

  .products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 25px;
  }

  .product-card {
    background: var(--black2);
    border: 1px solid rgba(255,255,255,0.05);
    transition: transform 0.3s ease;
    overflow: hidden;
  }
  .product-card:hover { transform: translateY(-5px); border-color: var(--red); }

  /* Ajuste crítico para que la imagen se vea */
  .product-img-box {
    width: 100%;
    aspect-ratio: 1/1;
    background: #F4F4F4; /* Fondo claro para resaltar ropa oscura */
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .product-img-box img {
    width: 90%; /* Un poco de margen interno */
    height: 90%;
    object-fit: contain; /* Evita que la prenda se corte */
  }

  .product-badge {
    position: absolute;
    top: 12px;
    left: 12px;
    background: var(--red);
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    text-transform: uppercase;
  }

  .product-info { padding: 20px; }
  .product-brand { color: var(--red); font-weight: 700; font-size: 12px; text-transform: uppercase; margin-bottom: 5px; }
  .product-name { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700; margin-bottom: 15px; height: 50px; }

  .btn-buy {
    display: block;
    width: 100%;
    background: var(--red);
    color: white;
    text-align: center;
    text-decoration: none;
    font-weight: 700;
    padding: 12px;
    text-transform: uppercase;
    transition: background 0.2s;
  }
  .btn-buy:hover { background: var(--red-dark); }
</style>
</head>
<body>

<nav>
  <a href="#" class="nav-logo">RESALES<span>PR</span></a>
</nav>

<section class="products-section">
  <h2 class="section-title">NUEVOS DROPS</h2>

  <div class="products-grid">
    <div class="product-card">
      <div class="product-img-box">
        <span class="product-badge">HOT</span>
        <img src="1189994_01.jpg.jpeg" alt="Supreme Devil Tee">
      </div>
      <div class="product-info">
        <p class="product-brand">Supreme</p>
        <h3 class="product-name">Devil Tee Black</h3>
        <a href="https://wa.me/1787XXXXXXX" class="btn-buy">DM PARA INFO</a>
      </div>
    </div>

    <div class="product-card">
      <div class="product-img-box">
        <span class="product-badge">NEW</span>
        <img src="supreme-body-snatchers.jpg.jpg" alt="Supreme Body Snatchers">
      </div>
      <div class="product-info">
        <p class="product-brand">Supreme</p>
        <h3 class="product-name">Body Snatchers Navy</h3>
        <a href="https://wa.me/1787XXXXXXX" class="btn-buy">DM PARA INFO</a>
      </div>
    </div>

    <div class="product-card">
      <div class="product-img-box">
        <span class="product-badge">TRENDING</span>
        <img src="supreme-apes-orange.jpg.jpg" alt="Supreme Apes">
      </div>
      <div class="product-info">
        <p class="product-brand">Supreme</p>
        <h3 class="product-name">Apes Tee Orange</h3>
        <a href="https://wa.me/1787XXXXXXX" class="btn-buy">DM PARA INFO</a>
      </div>
    </div>

    <div class="product-card">
      <div class="product-img-box">
        <span class="product-badge">CLASSIC</span>
        <img src="supreme-evolution-tee.jpg.jpg" alt="Supreme Evolution">
      </div>
      <div class="product-info">
        <p class="product-brand">Supreme</p>
        <h3 class="product-name">Evolution Tee Black</h3>
        <a href="https://wa.me/1787XXXXXXX" class="btn-buy">DM PARA INFO</a>
      </div>
    </div>

    <div class="product-card">
      <div class="product-img-box">
        <span class="product-badge">NIKE COLLAB</span>
        <img src="supreme-nike-cap-purple.jpg.jpg" alt="Supreme Nike Cap">
      </div>
      <div class="product-info">
        <p class="product-brand">Supreme x Nike</p>
        <h3 class="product-name">Corduroy Cap Purple</h3>
        <a href="https://wa.me/1787XXXXXXX" class="btn-buy">DM PARA INFO</a>
      </div>
    </div>
  </div>
</section>

</body>
</html>
